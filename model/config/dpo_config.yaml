# model/config/dpo_config.yaml
model:
  base_model: "output/qlora/merged_model"  # SFT 완료된 모델
  max_seq_length: 2048

dpo:
  beta: 0.1                    # KL divergence 페널티 강도
  loss_type: "sigmoid"          # sigmoid DPO (기본)
  max_prompt_length: 512
  max_completion_length: 1024

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  num_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  bf16: true
  logging_steps: 10
  save_steps: 200
  output_dir: "./output/dpo"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
